# Production stack (standalone). Usage from project root:
#   docker compose -f docker-compose.prod.yaml --env-file .env up -d --build
#
# Copy docker-compose.yaml.example to docker-compose.yaml for local dev; use this file only on servers.

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    container_name: spending_plan_php
    working_dir: /var/www/app
    volumes:
      # Symfony runtime loads this path; env_file alone does not create the file in the image.
      - ./.env:/var/www/app/.env:ro
    env_file:
      - .env
    environment:
      # Force prod mode regardless of host .env used for variable substitution in dev machines.
      APP_ENV: prod
      APP_DEBUG: "0"
      XDEBUG_MODE: "off"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: spending_plan_nginx
    depends_on:
      - php
    expose:
      - "80"
    volumes:
      - ./public:/var/www/app/public:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16-alpine
    container_name: spending_plan_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: spending_plan_redis
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: spending_plan_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
