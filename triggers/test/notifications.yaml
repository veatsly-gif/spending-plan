notifications:
  - code: declaration_send_daily
    type: time_based
    date:
      day_of_month_lte: 10
    triggers:
      - declaration-send
    delivery_types:
      - pop-up
      - telegram
    template: declaration_send_tax_service
    frequency:
      mode: interval
      interval_seconds: 86400

  - code: missing_next_month_spending_plans_daily
    type: time_based
    date:
      day_of_month_gt: 25
    triggers:
      - missing_next_month_spending_plans
    delivery_types:
      - pop-up
    template: spending_plan_missing_next_month
    frequency:
      mode: interval
      interval_seconds: 86400
