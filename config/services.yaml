# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    redis_dsn_default: 'redis://redis:6379'
    deepl_api_base_url_default: 'https://api-free.deepl.com'
    deepl_usage_stop_percent_default: '95'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $botToken: '%env(default::TELEGRAM_BOT_TOKEN)%'
            string $telegramWebhookSecret: '%env(default::TELEGRAM_WEBHOOK_SECRET)%'
            string $redisDsn: '%env(default:redis_dsn_default:REDIS_DSN)%'
            string $deepLApiKey: '%env(default::DEEPL_API_KEY)%'
            string $deepLApiBaseUrl: '%env(default:deepl_api_base_url_default:DEEPL_API_BASE_URL)%'
            int $deepLUsageStopPercent: '%env(int:default:deepl_usage_stop_percent_default:DEEPL_USAGE_STOP_PERCENT)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Triggers\:
        resource: '../src/Triggers/'
        tags: ['app.notification_trigger']

    App\Service\Notification\Template\:
        resource: '../src/Service/Notification/Template/'
        tags: ['app.notification_template']

    App\Service\Notification\Delivery\:
        resource: '../src/Service/Notification/Delivery/'
        tags: ['app.notification_delivery_handler']

    App\Service\Notification\NotificationCenter:
        arguments:
            $templateRenderers: !tagged_iterator app.notification_template
            $deliveryHandlers: !tagged_iterator app.notification_delivery_handler

    App\Service\NotificationTriggerConfigLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $environment: '%kernel.environment%'

    App\Service\NotificationTriggerRunner:
        arguments:
            $triggers: !tagged_iterator app.notification_trigger

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
